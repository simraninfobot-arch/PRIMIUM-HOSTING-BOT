# ================================
# 🎨 Render Deploy Config
# ================================

services:
  - type: web
    name: telegram-hosting-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID_1
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GROUP_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: REQUIRED_CHANNEL
        sync: false
      - key: REQUIRED_CHANNEL_ID
        sync: false
      - key: PORT
        value: "8080"
      - key: WEBHOOK_URL
        value: ""
