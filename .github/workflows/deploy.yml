name: Deploy Bot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 3.11 setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dependencies install
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py config.py && echo "Code OK!"

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Success Notification
        run: echo "Tests pass ho gaye! Hosting platform auto-deploy karega."
        
