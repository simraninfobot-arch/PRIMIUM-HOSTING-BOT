# =====================================
# 🐳 Docker Compose — Local/VPS ke liye
# =====================================
# Run karo: docker-compose up -d

version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: telegram-hosting-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./hosted_projects:/app/hosted_projects
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
